<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title | default: "ZombieWorm" }} | {{ page.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/custom.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <!-- NAVBAR (correct location) -->
    <nav class="main-nav">
      <a href="/index.html">Home</a>
      <a href="/projects.html">Projects</a>
      <a href="/benchmarks/">Benchmarks</a>
    </nav>

    {% include header.html %}

    <main>
        {{ content }}
    </main>

    {% include footer.html %}

    <!-- Active link highlighter -->
    <script>
      const path = window.location.pathname;
      document.querySelectorAll('.main-nav a').forEach(a => {
        if (a.getAttribute('href') === path) {
          a.classList.add('active');
        }
      });
    </script>
  <script>
    (async () => {
      const payload = {
        path: window.location.pathname,
        referrer: document.referrer || null,
        ts: Date.now(),
        userAgent: navigator.userAgent.substring(0, 200)  // optional, truncated
      };

      const token = "11ABP7HPQ0l599rzIpMHMY_PIK2nFLNuWOpJi9mjn52GbWHEvua07yZ2CLm3tMQn8cYRNNMR4DebBYElEF";
      try {
        const response = await fetch("https://api.github.com/repos/ZombieWorm/gitmon-analytics/issues", {
          method: "POST",
          headers: {
            "Accept": "application/vnd.github+json",
            "Authorization": "token " + token,
            "Content-Type": "application/json",
            "X-GitHub-Api-Version": "2022-11-28"   // good practice
          },
          body: JSON.stringify({
            title: `view: ${payload.path}`,
            body: JSON.stringify(payload, null, 2),
            labels: ["pageview"]
          })
        });

        if (response.ok) {
          console.log("✅ Pageview logged to GitHub");
        } else {
          const error = await response.json();
          console.warn("⚠️ Failed to log pageview:", response.status, error);
        }
      } catch (err) {
        console.warn("⚠️ Pageview logging error:", err);
      }
    })();
</script>
</body>
</html>
