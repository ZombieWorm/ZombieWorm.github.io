<script>
  console.log("🚀 GitHub Analytics started - Path:", window.location.pathname);

  (async () => {
    const token = "5RcvuomK7XsHfG30lIzbgsYqQY7wWr3b8Pz";   // ← new classic token

    try {
      const response = await fetch("https://api.github.com/repos/ZombieWorm/gitmon-analytics/issues", {
        method: "POST",
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `token ${token}`,   // Classic format
          "Content-Type": "application/json",
          "X-GitHub-Api-Version": "2022-11-28"
        },
        body: JSON.stringify({
          title: `test view: ${window.location.pathname} - ${new Date().toISOString().slice(0,19)}`,
          body: "Test issue from browser script",
          labels: ["pageview"]
        })
      });

      if (response.ok) {
        console.log("🎉 SUCCESS! Issue created with classic token");
      } else {
        const err = await response.json().catch(() => ({}));
        console.error(`❌ Failed (${response.status}):`, err.message || err);
      }
    } catch (err) {
      console.error("❌ Script error:", err.message);
    }
  })();
</script>
