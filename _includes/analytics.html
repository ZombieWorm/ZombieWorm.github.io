<script>
(async () => {
  const payload = {
    path: window.location.pathname,
    referrer: document.referrer || "direct",
    ts: Date.now(),
    userAgent: navigator.userAgent.substring(0, 150)
  };

  const token = "11ABP7HPQ0l599rzIpMHMY_PIK2nFLNuWOpJi9mjn52GbWHEvua07yZ2CLm3tMQn8cYRNNMR4DebBYElEF";

  console.log("🚀 Starting pageview logging for:", payload.path);

  try {
    const response = await fetch("https://api.github.com/repos/ZombieWorm/gitmon-analytics/issues", {
      method: "POST",
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": `token ${token}`,        // Try "token " first
        "Content-Type": "application/json",
        "X-GitHub-Api-Version": "2022-11-28"
      },
      body: JSON.stringify({
        title: `view: ${payload.path}`,
        body: JSON.stringify(payload, null, 2),
        labels: ["pageview"]
      })
    });

    const data = await response.json().catch(() => ({}));

    if (response.ok) {
      console.log("✅ SUCCESS! Issue created:", data.html_url || data);
    } else {
      console.error(`❌ FAILED - Status: ${response.status}`);
      console.error("Error message:", data.message || data);
      console.error("Full error object:", data);
    }
  } catch (err) {
    console.error("❌ Network / JavaScript error:", err.message);
  }
})();
</script>
<script>
console.log("✅ Analytics include is LOADED on this page");
console.log("Current path:", window.location.pathname);
</script>
