<div class="benchmark-item" style="margin: 2rem 0; padding: 2rem; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h3 style="color: #667eea;">{{ include.title }}</h3>
    
    <a href="{{ site.baseurl }}/benchmarks/{{ include.slug | default: '5080-feedback' }}/" 
       class="cta-btn" 
       style="display: inline-block; padding: 0.75rem 1.5rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white !important; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 1rem;">
        View Detailed Results →
    </a>

    <div class="benchmark-preview" style="margin-top: 1.5rem;">
        {{ include.preview | default: "Detailed benchmark data and analysis." }}
    </div>
</div>
