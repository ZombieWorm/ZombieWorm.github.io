<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Name • Developer / Creator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
    --bg: #0a0a15;
    --text: #e0e0ff;
    --accent: #00d4ff;
    --card: #16162a;
    --border: rgba(0, 212, 255, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .nav {
    display: flex;
    gap: 1.5rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
    }

    .nav a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    }

    .nav a:hover {
    text-decoration: underline;
    }
    body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 2rem 5vw;
    }

    .hero {
      min-height: 100vh;
      padding: 3rem 5vw;
      display: grid;
      grid-template-columns: 1fr minmax(auto, 620px) 1fr;
      align-content: center;
      gap: 4rem;
      background: linear-gradient(135deg, #0f0f17 0%, #13132b 100%);
    }

    .left-column {
      grid-column: 2 / 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2.2rem;
    }

    h1 {
      font-size: clamp(3.2rem, 7vw, 5.8rem);
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(90deg, #a5d8ff, #00d4ff, #a5d8ff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: shine 8s linear infinite;
    }

    @keyframes shine {
      to { background-position: 200% center; }
    }

    .tagline {
      font-size: 1.4rem;
      color: #a0a0d0;
      max-width: 540px;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      font-size: 0.98rem;
    }

    .skill-pill {
      background: rgba(0, 212, 255, 0.11);
      color: var(--accent);
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(0, 212, 255, 0.18);
      white-space: nowrap;
    }

    .projects-showcase {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .project-card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.4rem;
      border: 1px solid rgba(0, 212, 255, 0.08);
      transition: all 0.22s ease;
    }

    .project-card:hover {
      transform: translateY(-6px);
      border-color: rgba(0, 212, 255, 0.35);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .project-title {
      color: var(--accent);
      margin-bottom: 0.6rem;
      font-size: 1.18rem;
      font-weight: 600;
    }

    .project-desc {
      font-size: 0.96rem;
      color: #b0b0d8;
      margin-bottom: 1rem;
    }

    .links {
      display: flex;
      gap: 1.2rem;
      margin-top: 1.8rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1.6rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0f0f17;
    }
    .btn-primary:hover {
      background: #00eaff;
      transform: translateY(-2px);
    }

    .btn-outline {
      border: 1.5px solid var(--accent);
      color: var(--accent);
    }
    .btn-outline:hover {
      background: rgba(0, 212, 255, 0.1);
    }

    footer.contact {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.95rem;
      color: #707090;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    @media (max-width: 780px) {
      .hero {
        grid-template-columns: 1fr;
        padding: 3rem 6vw 5rem;
      }
      h1 {
        font-size: clamp(2.8rem, 9vw, 4.8rem);
      }
    }
  </style>
<meta name="description" content="ZombieWorm - AI deployment, local LLMs, GPU optimization benchmarks and Python tooling">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>

</div>

</html>
