title: ZombieWorm
description: AI deployment, local LLMs, Python tooling & home-lab experiments
baseurl: ""
url: "https://zombieworm.github.io"

# Use your forked theme
plugins:
  - jekyll-remote-theme

remote_theme: ZombieWorm/jekyll-remote-theme

# collections
collections:
  benchmarks:
    output: true
    permalink: /benchmarks/:name/

# Optional: help debug by showing drafts etc.
show_drafts: false

# Optional but recommended
markdown: GFM
highlighter: rouge

# Navigation (your theme may use this)
nav:
  - name: "Home"
    link: "/"
  - name: "Projects"
    link: "/projects"
  - name: "Benchmarks"
    link: "/benchmarks"
  - name: "About"
    link: "/about"

# Social links (add more if you want)
social:
  github: "ZombieWorm"
